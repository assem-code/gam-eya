<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قرعة الجمعية - سحب فردي ومراكز ثابتة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151b2b;
            --accent-color: #00e676;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --border-color: #1e293b;
            --danger: #ff5252;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body {
            background-color: var(--bg-color); color: var(--text-main);
            padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .app-container {
            width: 100%; max-width: 550px; background-color: var(--card-bg);
            border-radius: 24px; padding: 30px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            border: 1px solid var(--border-color);
        }

        #createView { text-align: center; }
        .icon-header { font-size: 50px; color: var(--accent-color); margin-bottom: 20px; }
        h1 { font-size: 24px; margin-bottom: 10px; }
        p.subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 20px; }

        input[type="number"], input[type="text"] {
            width: 100%; background: #0f172a; border: 1px solid var(--border-color);
            border-radius: 12px; padding: 15px; color: #fff; font-size: 16px; margin-bottom: 15px; text-align: center;
        }
        input:focus { outline: none; border-color: var(--accent-color); }

        button {
            width: 100%; cursor: pointer; border: none; border-radius: 12px; padding: 16px;
            font-size: 16px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 10px;
            background: var(--accent-color); color: #000; transition: transform 0.2s;
        }
        button:active { transform: scale(0.97); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-secondary { background-color: #1e293b; color: var(--text-main); border: 1px solid var(--border-color); padding: 10px;}
        
        /* قسم حجز المراكز */
        .pre-assign-box {
            background: #0f172a; padding: 20px; border-radius: 16px; border: 1px solid var(--border-color);
            margin-bottom: 20px; text-align: right; display: none;
        }
        .pre-assign-inputs { display: flex; gap: 10px; margin-bottom: 10px; }
        .pre-assign-inputs input { margin-bottom: 0; padding: 10px; font-size: 14px;}
        
        .fixed-list-item {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--card-bg); padding: 10px 15px; border-radius: 8px; margin-bottom: 8px; border: 1px solid var(--border-color);
        }
        .btn-delete-fixed { background: none; color: var(--danger); padding: 5px; width: auto; font-size: 18px; }

        #roomView { display: none; }
        
        .tabs { display: flex; background: #0f172a; border-radius: 12px; margin-bottom: 25px; padding: 5px; }
        .tab-btn {
            flex: 1; background: transparent; color: var(--text-muted); padding: 12px;
            border-radius: 8px; font-size: 15px; transition: 0.3s;
        }
        .tab-btn.active { background: var(--card-bg); color: var(--accent-color); font-weight: 700; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }

        .draw-section { text-align: center; padding: 20px 0; }
        .slots-info { background: #0f172a; padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); margin-bottom: 20px; }
        .slots-info span { font-size: 20px; font-weight: bold; color: var(--accent-color); }

        .result-card {
            display: none; background: linear-gradient(145deg, #0f172a, #151b2b);
            border: 2px solid var(--accent-color); border-radius: 16px; padding: 30px; margin-top: 20px;
        }
        .result-card h2 { font-size: 40px; color: var(--accent-color); margin: 10px 0; }

        .board-list { display: flex; flex-direction: column; gap: 10px; }
        .board-item {
            display: flex; justify-content: space-between; align-items: center;
            background: #0f172a; border: 1px solid var(--border-color);
            padding: 15px 20px; border-radius: 12px;
        }
        .board-item .slot-num { background: var(--card-bg); color: var(--text-muted); padding: 5px 12px; border-radius: 8px; font-weight: bold; border: 1px solid var(--border-color); }
        .board-item .slot-name { font-size: 16px; font-weight: 600; }
        .board-item.filled { border-color: rgba(0, 230, 118, 0.3); }
        .board-item.filled .slot-num { color: var(--accent-color); border-color: rgba(0, 230, 118, 0.3); }
        
        .copy-link-btn { background: #1e293b; color: #fff; margin-bottom: 20px; padding: 12px; font-size: 14px;}

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="createView">
            <i class="fa-solid fa-layer-group icon-header"></i>
            <h1>تأسيس جمعية جديدة</h1>
            <p class="subtitle">حدد الإجمالي أولاً، ثم ثبت المراكز المطلوبة إن وجدت</p>
            
            <input type="number" id="slotsCount" placeholder="العدد الإجمالي للمشتركين (مثال: 10)" min="2" max="50" oninput="showPreAssignBox()">
            
            <div class="pre-assign-box" id="preAssignBox">
                <h3 style="font-size: 16px; margin-bottom: 15px; color: var(--accent-color);"><i class="fa-solid fa-thumbtack"></i> حجز مراكز ثابتة مسبقاً</h3>
                <div class="pre-assign-inputs">
                    <input type="number" id="fixedNum" placeholder="المركز" style="width: 30%;">
                    <input type="text" id="fixedName" placeholder="اسم الشخص (مثال: عاصم)" style="width: 70%;">
                </div>
                <button class="btn-secondary" onclick="addFixedSlot()">
                    <i class="fa-solid fa-plus"></i> تثبيت المركز
                </button>
                <div id="fixedListUI" style="margin-top: 15px;"></div>
            </div>

            <button onclick="createRoom()">
                <i class="fa-solid fa-wand-magic-sparkles"></i> إنشاء الغرفة وبدء السحب
            </button>
        </div>

        <div id="roomView">
            <button class="copy-link-btn" onclick="copyLink()">
                <i class="fa-solid fa-link"></i> انسخ الرابط وأرسله للمشتركين
            </button>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('drawTab')">
                    <i class="fa-solid fa-hand-pointer"></i> سحب دوري
                </button>
                <button class="tab-btn" onclick="switchTab('boardTab')">
                    <i class="fa-solid fa-list-ol"></i> لوحة الترتيب
                </button>
            </div>

            <div id="drawTab" class="tab-content active draw-section">
                <div class="slots-info">
                    الخانات المتبقية للسحب: <span id="remainingCount">-</span> من أصل <span id="totalCount">-</span>
                </div>
                
                <div id="drawActionArea">
                    <input type="text" id="playerName" placeholder="اكتب اسمك الثلاثي هنا...">
                    <button id="drawBtn" onclick="drawMySlot()">
                        <i class="fa-solid fa-shuffle"></i> اسحب ورقتي العشوائية
                    </button>
                </div>

                <div id="myResult" class="result-card">
                    <p>مبروك يا <span id="resName"></span>! دورك هو الشهر:</p>
                    <h2 id="resSlot"></h2>
                    <p style="color: var(--text-muted); font-size: 12px; margin-top:10px;">تم تسجيل النتيجة وتثبيتها بجهازك</p>
                </div>
            </div>

            <div id="boardTab" class="tab-content">
                <div class="board-list" id="boardList"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDjbmmc2fbNZvM_i39GepPojSQIZk4oaI0",
            authDomain: "ko3a-d7e0d.firebaseapp.com",
            projectId: "ko3a-d7e0d",
            storageBucket: "ko3a-d7e0d.firebasestorage.app",
            messagingSenderId: "1074124539072",
            appId: "1:1074124539072:web:e42fffcea5a5bb4b665925"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        let roomId = urlParams.get('room');
        
        let myDeviceId = localStorage.getItem('device_fingerprint');
        if (!myDeviceId) {
            myDeviceId = 'dev_' + Math.random().toString(36).substr(2, 12);
            localStorage.setItem('device_fingerprint', myDeviceId);
        }

        let totalSlots = 0;
        let availableSlots = [];
        let filledSlots = {}; 
        let drawnDevices = []; 
        let tempFixedSlots = {}; // كائن لحفظ المراكز الثابتة قبل إنشاء الغرفة

        if (roomId) {
            document.getElementById('createView').style.display = 'none';
            document.getElementById('roomView').style.display = 'block';
            listenToRoom();
        }

        // إظهار قسم المراكز الثابتة بمجرد كتابة العدد
        window.showPreAssignBox = function() {
            const count = parseInt(document.getElementById('slotsCount').value);
            if (count > 0) {
                document.getElementById('preAssignBox').style.display = 'block';
            } else {
                document.getElementById('preAssignBox').style.display = 'none';
            }
        }

        // إضافة مركز ثابت
        window.addFixedSlot = function() {
            const count = parseInt(document.getElementById('slotsCount').value);
            const num = parseInt(document.getElementById('fixedNum').value);
            const name = document.getElementById('fixedName').value.trim();

            if (!num || num < 1 || num > count) { alert('أدخل رقم مركز صحيح ضمن العدد الإجمالي!'); return; }
            if (!name) { alert('أدخل اسم الشخص!'); return; }
            if (Object.values(tempFixedSlots).includes(name)) { alert('هذا الاسم تم حجزه بالفعل!'); return; }
            
            tempFixedSlots[num] = name;
            document.getElementById('fixedNum').value = '';
            document.getElementById('fixedName').value = '';
            renderFixedListUI();
        }

        // مسح مركز ثابت
        window.removeFixedSlot = function(num) {
            delete tempFixedSlots[num];
            renderFixedListUI();
        }

        function renderFixedListUI() {
            const listUI = document.getElementById('fixedListUI');
            listUI.innerHTML = '';
            for (let [num, name] of Object.entries(tempFixedSlots)) {
                listUI.innerHTML += `
                    <div class="fixed-list-item">
                        <span>المركز <strong style="color:var(--accent-color)">${num}</strong>: ${name}</span>
                        <button class="btn-delete-fixed" onclick="removeFixedSlot(${num})"><i class="fa-solid fa-circle-xmark"></i></button>
                    </div>
                `;
            }
        }

        window.createRoom = async function() {
            const count = parseInt(document.getElementById('slotsCount').value);
            if (!count || count < 2) { alert('أدخل رقماً إجمالياً صحيحاً (أكبر من 1)'); return; }

            const btn = document.querySelector('#createView button:last-child');
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> جاري تأسيس الغرفة...`;
            btn.disabled = true;

            const randomId = Math.random().toString(36).substring(2, 8).toUpperCase();
            
            // توليد قائمة الأرقام المتاحة للسحب مع استبعاد المراكز المحجوزة
            let slotsArray = [];
            for (let i = 1; i <= count; i++) {
                if (!tempFixedSlots[i]) {
                    slotsArray.push(i);
                }
            }

            try {
                // حفظ البيانات، وتمرير المراكز المحجوزة لتصبح مشغولة مسبقاً
                await setDoc(doc(db, "rooms", randomId), {
                    totalSlots: count,
                    availableSlots: slotsArray,
                    filledSlots: tempFixedSlots,
                    drawnDevices: [] 
                });
                window.location.search = `?room=${randomId}`;
            } catch (error) {
                alert("حدث خطأ! يرجى المحاولة مرة أخرى.");
                btn.innerHTML = `<i class="fa-solid fa-wand-magic-sparkles"></i> إنشاء الغرفة وبدء السحب`;
                btn.disabled = false;
            }
        };

        function listenToRoom() {
            onSnapshot(doc(db, "rooms", roomId), (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    totalSlots = data.totalSlots;
                    availableSlots = data.availableSlots || [];
                    filledSlots = data.filledSlots || {};
                    drawnDevices = data.drawnDevices || [];
                    
                    updateUI();
                }
            });
        }

        function updateUI() {
            document.getElementById('totalCount').innerText = totalSlots;
            document.getElementById('remainingCount').innerText = availableSlots.length;

            const myStoredSlot = localStorage.getItem(`drawn_${roomId}`);
            const myStoredName = localStorage.getItem(`name_${roomId}`);

            if (myStoredSlot) {
                document.getElementById('drawActionArea').style.display = 'none';
                document.getElementById('myResult').style.display = 'block';
                document.getElementById('resName').innerText = myStoredName;
                document.getElementById('resSlot').innerText = myStoredSlot;
            } 
            else if (drawnDevices.includes(myDeviceId)) {
                document.getElementById('drawActionArea').innerHTML = `<p style="color:var(--danger); padding:20px; font-weight:bold;">لقد قمت بالسحب مسبقاً من هذا الجهاز!</p>`;
            }
            else if (availableSlots.length === 0) {
                document.getElementById('drawActionArea').innerHTML = `<p style="color:var(--text-muted); padding:20px;">اكتمل سحب جميع الخانات المتاحة!</p>`;
            }

            const boardList = document.getElementById('boardList');
            boardList.innerHTML = '';
            
            for (let i = 1; i <= totalSlots; i++) {
                const item = document.createElement('div');
                const occupantName = filledSlots[i];
                
                if (occupantName) {
                    item.className = 'board-item filled';
                    item.innerHTML = `<div class="slot-num">${i}</div><div class="slot-name">${occupantName}</div>`;
                } else {
                    item.className = 'board-item';
                    item.innerHTML = `<div class="slot-num">${i}</div><div class="slot-name" style="color: var(--text-muted);">في انتظار السحب...</div>`;
                }
                boardList.appendChild(item);
            }
        }

        window.drawMySlot = async function() {
            const nameInput = document.getElementById('playerName');
            const name = nameInput.value.trim();
            const btn = document.getElementById('drawBtn');

            if (!name) { alert('يجب كتابة اسمك أولاً!'); return; }

            if (drawnDevices.includes(myDeviceId)) {
                alert("تم رصد محاولة سحب متكررة من نفس الجهاز! العملية مرفوضة.");
                return;
            }

            if (Object.values(filledSlots).includes(name)) {
                alert('هذا الاسم تم تسجيله بالفعل في الجمعية!'); return;
            }

            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> جاري سحب ورقتك السحابية...`;

            const roomRef = doc(db, "rooms", roomId);

            try {
                await runTransaction(db, async (transaction) => {
                    const roomDoc = await transaction.get(roomRef);
                    const data = roomDoc.data();
                    let currentAvailable = data.availableSlots || [];
                    let currentFilled = data.filledSlots || {};
                    let currentDevices = data.drawnDevices || [];

                    if (currentAvailable.length === 0) throw "لا توجد خانات فارغة للسحب!";
                    if (currentDevices.includes(myDeviceId)) throw "لقد قمت بالسحب مسبقاً!";

                    const randomIndex = Math.floor(Math.random() * currentAvailable.length);
                    const selectedSlot = currentAvailable[randomIndex];

                    currentAvailable.splice(randomIndex, 1);
                    currentFilled[selectedSlot] = name;
                    currentDevices.push(myDeviceId); 

                    transaction.update(roomRef, {
                        availableSlots: currentAvailable,
                        filledSlots: currentFilled,
                        drawnDevices: currentDevices
                    });

                    localStorage.setItem(`drawn_${roomId}`, selectedSlot);
                    localStorage.setItem(`name_${roomId}`, name);
                });
            } catch (error) {
                console.error("خطأ:", error);
                alert(typeof error === 'string' ? error : "حدث خطأ، يرجى المحاولة مرة أخرى.");
                btn.disabled = false;
                btn.innerHTML = `<i class="fa-solid fa-shuffle"></i> اسحب ورقتي العشوائية`;
            }
        };

        window.switchTab = function(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        window.copyLink = function() {
            navigator.clipboard.writeText(window.location.href);
            alert('تم نسخ الرابط! أرسله للمشتركين ليدخل كل منهم لسحب الخانات المتبقية.');
        }
    </script>
</body>
</html>
